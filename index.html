<!DOCTYPE html>
<html lang="en" style="overflow-x: hidden;">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ｃᴅᴛ Ｄᴜᴍɪʏʜ Ｏꜰᴄ</title>
  <link rel="stylesheet" href="style.css">
  <script type="module" src="https://unpkg.com/@splinetool/viewer@1.9.96/build/spline-viewer.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="background-elements"></div>
  <nav>
    <div class="nav-logo">Ｃᴅᴛ Ｄᴜᴍɪʏʜ Ｏꜰᴄ</div>
    <div class="nav-links">
      <a href="#">Hᴏᴍᴇ</a>
      <a href="#">Fᴇᴀᴛᴜʀᴇꜱ</a>
      <a href="#">Aʙᴏᴜᴛ</a>
      <a href="#">Pʀɪᴄɪɴɢ</a>
      <a href="#">Bʟᴏɢ</a>
    </div>
    <button class="nav-contact">Cᴏɴᴛᴀᴄᴛ Uꜱ</button>
    <div class="hamburger" onclick="toggleMenu()">
      <span></span>
      <span></span>
      <span></span>
      <span></span>
    </div>
  </nav>

  <div class="overlay" id="overlay" onclick="toggleMenu()"></div>
  <div class="mobile-menu" id="mobileMenu">
    <div class="close-btn" onclick="toggleMenu()">
      <i class="fas fa-times"></i>
    </div>
    <a href="#" onclick="toggleMenu()">Hᴏᴍᴇ</a>
      <a href="#" onclick="toggleMenu()">Fᴇᴀᴛᴜʀᴇꜱ</a>
      <a href="#" onclick="toggleMenu()">Aʙᴏᴜᴛ</a>
      <a href="#" onclick="toggleMenu()">Pʀɪᴄɪɴɢ</a>
      <a href="#" onclick="toggleMenu()">Bʟᴏɢ</a>
  </div>

  <div class="container">
    <div class="content">
      <h1>Bʀɪɴɢ Yᴏᴜʀ Iᴅᴇᴀꜱ Tᴏ Lɪꜰᴇ</h1>
      <p>
        Tʜɪꜱ ɪꜱ ʏᴏᴜʀ ꜱᴘᴀᴄᴇ ᴛᴏ ᴅᴇꜱᴄʀɪʙᴇ ʏᴏᴜʀ ᴘʀᴏᴅᴜᴄᴛ ꜱᴇʀᴠɪᴄᴇ ᴏʀ ɪᴅᴇᴀ. Tʜᴇ 3D ꜱᴄᴇɴꜱᴇ
        ᴏɴ ᴛʜᴇ ʀɪɢʜᴛ ᴇɴʜᴀɴᴄᴇꜱ ᴠɪꜱᴜᴀʟ ᴇɴɢᴀɢᴇᴍᴇɴᴛ ᴀɴᴅ ɪɴᴛᴇʀᴀᴄᴛɪᴠɪᴛʏ ᴡɪᴛʜ ᴀ ᴍᴏᴅᴇʀɴ ᴘᴜʀᴘʟᴇ ɴᴇᴏɴ ᴀᴇꜱᴛʜᴇᴛɪᴄ.
      </p>
      <div class="buttons">
        <button>Gᴇᴛ Sᴛᴀʀᴛᴇᴅ</button>
        <button>Lᴇᴀʀɴ Mᴏʀᴇ</button>
      </div>
      <div class="social-icons">
        <a href="#"><i class="fab fa-facebook"></i></a>
        <a href="#"><i class="fab fa-twitter"></i></a>
        <a href="#"><i class="fab fa-instagram"></i></a>
        <a href="#"><i class="fab fa-github"></i></a>
      </div>
    </div>
    <div class="bg-main-container">
      <div class="bg-main">
<spline-viewer url="https://prod.spline.design/BoWg-dch2T9e59sl/scene.splinecode"></spline-viewer>
      </div>
    </div>
  </div>
  <script>
    function toggleMenu() {
      const hamburger = document.querySelector('.hamburger');
      const mobileMenu = document.getElementById('mobileMenu');
      const overlay = document.getElementById('overlay');
      
      hamburger.classList.toggle('open');
      mobileMenu.classList.toggle('open');
      overlay.classList.toggle('active');
      
      // Tᴏɢɢʟᴇ ʙᴏᴅʏ ᴏᴠᴇʀꜰʟᴏᴡ ᴡʜᴇɴ ᴍᴇɴᴜ ɪꜱ ᴏᴘᴇɴ
      if (mobileMenu.classList.contains('open')) {
        document.body.style.overflow = 'hidden';
      } else {
        document.body.style.overflow = '';
      }
    }

    // Cʟᴏꜱᴇ ᴍᴇɴᴜ ᴡʜᴇɴ ᴄʟɪᴄᴋɪɴɢ ᴏᴜᴛꜱɪᴅᴇ
    document.addEventListener('click', function(event) {
      const mobileMenu = document.getElementById('mobileMenu');
      const hamburger = document.querySelector('.hamburger');
      const overlay = document.getElementById('overlay');
      
      if (mobileMenu.classList.contains('open') && 
          !mobileMenu.contains(event.target) && 
          !hamburger.contains(event.target)) {
        toggleMenu();
      }
    });
  </script>
</body>
</html>
